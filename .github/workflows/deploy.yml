name: Deploy Slidev Site

on:
  push:
    branches: [ master ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Build home
      - name: Build home
        run: |
           npx slidev build slides.md --base / --out ${{ github.workspace }}/build/home

      - name: Build info1
        run: |
          npx slidev build info1/slides.md --base /info1/ --out ${{ github.workspace }}/build/info1

      - name: Build git
        run: |
          npx slidev build git/slides.md --base /git/ --out ${{ github.workspace }}/build/git

      - name: Build u01
        run: |
          npx slidev build info1/u01/slides.md --base /info1/u01/ --out ${{ github.workspace }}/build/info1/u01

      - name: Build u02
        run: |
          npx slidev build info1/u02/slides.md --base /info1/u02/ --out ${{ github.workspace }}/build/info1/u02

      - name: Build u03
        run: |
          npx slidev build info1/u03/slides.md --base /info1/u03/ --out ${{ github.workspace }}/build/info1/u03

      - name: Build u05
        run: |
          npx slidev build info1/u05/slides.md --base /info1/u05/ --out ${{ github.workspace }}/build/info1/u05

      - name: Create SPA fallbacks
        run: |
          find dist -name index.html | while read f; do
          cp "$f" "$(dirname "$f")/404.html"
          done

      - name: Assemble final dist
        run: |
          mkdir -p ${{ github.workspace }}/dist
          cp -r ${{ github.workspace }}/build/home/. ${{ github.workspace }}/dist/
          cp -r ${{ github.workspace }}/build/info1 ${{ github.workspace }}/dist/info1
          cp -r ${{ github.workspace }}/build/git ${{ github.workspace }}/dist/git
          cp -r ${{ github.workspace }}/build/info1/u01 ${{ github.workspace }}/dist/info1/u01
          cp -r ${{ github.workspace }}/build/info1/u02 ${{ github.workspace }}/dist/info1/u02
          cp -r ${{ github.workspace }}/build/info1/u03 ${{ github.workspace }}/dist/info1/u03
          cp -r ${{ github.workspace }}/build/info1/u05 ${{ github.workspace }}/dist/info1/u05

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

